# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",alacritty:RGB"
set -g escape-time 0
set -g focus-events on
set -g mouse on
set -g history-limit 10000
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g default-shell /usr/bin/fish

# reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"
set-hook -g client-attached 'source-file ~/.config/tmux/tmux.conf'

# clear pane
bind-key -n C-o send-keys C-l \; clear-history

# splits (open in current dir)
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# new window in current dir
bind c new-window -c "#{pane_current_path}"

# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# smart pane navigation (vim-tmux-navigator)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# copy mode
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# --- colors (PaperColor light) ---

# pane borders
set -g pane-border-style "fg=#bcbcbc"
set -g pane-active-border-style "fg=#0087af"

# status bar
set -g status on
set -g status-position bottom
set -g status-style "bg=#eeeeee,fg=#444444"
set -g status-left-length 30
set -g status-right-length 50

set -g status-left "#[bg=#0087af,fg=#ffffff] #{session_name} #[bg=#eeeeee,fg=#444444] "
set -g status-right "#[fg=#bcbcbc]| #[fg=#444444]%Y-%m-%d %H:%M "

# window list
setw -g window-status-style "bg=#eeeeee,fg=#bcbcbc"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "bg=#0087af,fg=#ffffff"
setw -g window-status-current-format " #I:#W "

# message / command prompt
set -g message-style "bg=#0087af,fg=#ffffff"

# attach to another session with session exit until none left
set-option -g detach-on-destroy off
